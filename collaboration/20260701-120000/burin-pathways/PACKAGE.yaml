  Formalizes the Burin spatiotemporal trust primitive as a Pathways substrate.
  Includes Presence templates, Conservation (Transect Trust) templates, and
  Pathways.TrustKey.* technique. Dual licensing: PolyForm NC kernel +
  Pathways license_terms on recipes.

