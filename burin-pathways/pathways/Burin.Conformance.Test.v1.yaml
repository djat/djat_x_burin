  - agent_id: burin_zk
    order: 5
    skill: conformance_bt5_zk_stub

  - agent_id: burin_export
    order: 6
    skill: conformance_bt6_paper_export

  - agent_id: burin_export
    order: 7
    skill: conformance_bt7_dual_bundle

is_system: true

tags:
  - burin
