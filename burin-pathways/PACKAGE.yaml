# Burin-as-Pathways bundle — packaging manifest

bundle_id: burin-pathways
version: "1.0.0"
title: "Burin as Pathways"
description: >
  Formalizes the Burin spatiotemporal trust primitive as a Pathways substrate.
  Presence-bearing steps emit burin_seal artifacts; orchestration lineage travels
  via Aqua. Dual licensing: PolyForm NC kernel + Pathways license_terms on recipes.

conformance_target_default: S
conformance_target_full: F

primary_artifact: APPLICATION_PLAYBOOK.md
pathways_index: pathways-index.yaml

attribution:
  source_substrate:
    label: "Burin — spatiotemporal trust primitive"
    originator: "Cameron Sajedi"
    originator_contact: cameronsajedi@gmail.com
    originator_did: did:placeholder:cameron-sajedi-burin
    kernel_license: PolyForm-Noncommercial-1.0.0
    source_repo: ../Burin/
  this_bundle_author:
    did: did:placeholder:dj-thomson-pathways
    label: "DJ Thomson (Pathways author)"
  license_terms:
    version: "1.0.0"
    fork: true
    attribution_required: true
    type: revenue-share
    royalty_split:
      - did: did:placeholder:cameron-sajedi-burin
        pct: 40
        role: substrate-originator
      - did: did:placeholder:dj-thomson-pathways
        pct: 40
        role: pathways-formalization
      - did: did:placeholder:channel-partner
        pct: 20
        role: witness-channel
    substrate_license_ref:
      substrate: burin
      kernel_license: PolyForm-Noncommercial-1.0.0
      commercial_kernel_contact: cameronsajedi@gmail.com
      orchestration_scope: pathway-template-only
    sovereignty_invariant_compliant: true

files:
  - APPLICATION_PLAYBOOK.md
  - PACKAGE.yaml
  - pathways-index.yaml
  - pathways/Presence.Field.CaptureSeal.v1.yaml
  - pathways/Presence.Survey.EffortProof.v1.yaml
  - pathways/Presence.Boundary.OverlapProof.v1.yaml
  - pathways/Presence.Witness.AppendAttestation@v1.yaml
  - pathways/Presence.Export.DegradeToPaper.v1.yaml
  - pathways/Presence.Bundle.DualAttestation.v1.yaml
  - pathways/Burin.Conformance.Test.v1.yaml
  - patterns/Pattern.BurinSubstrate.DualLicenseSplit.yaml
  - patterns/Pattern.PresencePathway.PresenceRequired.yaml
  - registry/composite-domains.yaml
  - registry/abstract-capabilities.yaml
  - registry/context-lenses.yaml

normative_substrate_docs:
  burin_scope: ../Burin/SCOPE.md
  burin_kernel: ../Burin/KERNEL.md
  pathways_architecture: ../PATHWAYS_ARCHITECTURE_v1.1.0.md
  pathways_reference: ../PATHWAYS_REFERENCE_v1.1.0.md
