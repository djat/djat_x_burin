app = "transect-trust"
primary_region = "iad"

[build]

[env]
  DATABASE_URL = "sqlite:////data/presence_passport.db"
  STATIC_DIR = "/app/static"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "data"
  destination = "/data"
